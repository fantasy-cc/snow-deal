name: Scrape Deals

on:
  schedule:
    # Run every 6 hours
    - cron: "0 */6 * * *"
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -e .
          cd aggregator && pip install -e .

      - name: Install Playwright Chromium
        run: playwright install chromium --with-deps

      - name: Run scraper
        run: snow-deals-agg -v refresh --max-pages 25

      - name: Fetch reviews
        run: snow-deals-agg fetch-reviews --delay 1.0 --max-reviews 200 || echo "fetch-reviews failed, skipping"

      - name: Upload deals.db to public data repo
        env:
          GH_TOKEN: ${{ secrets.DATA_REPO_TOKEN }}
        run: |
          # Upload to the public data repo so Render can download without auth
          # Requires a PAT (DATA_REPO_TOKEN) with repo scope for the target repo
          gh release delete latest-data --yes --repo lifan-builds/snow-deal-data 2>/dev/null || true
          gh release create latest-data \
            aggregator/deals.db \
            --repo lifan-builds/snow-deal-data \
            --title "Latest Deals Data" \
            --notes "Auto-generated by scrape workflow at $(date -u '+%Y-%m-%d %H:%M UTC')" \
            --latest=false

      - name: Trigger Render deploy
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK_URL" ]; then
            echo "RENDER_DEPLOY_HOOK_URL not set; skipping Render redeploy."
            exit 0
          fi
          echo "Triggering Render deploy hook..."
          curl -fsS "$RENDER_DEPLOY_HOOK_URL"
